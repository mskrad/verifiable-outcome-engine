<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifiable Outcome Engine – Demo</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header>
      <h1>Verifiable Outcome Engine</h1>
      <div class="nav">
        <a href="/play.html">Demo</a>
        <a href="/verify.html">Verify</a>
        <a href="/spec.html">Spec</a>
      </div>
    </header>
    <main>
      <div class="card">
        <h3>Active Devnet Signatures</h3>
        <p>
          Each signature below is a live devnet outcome. Pick one and open the Verify
          page — you will get <strong>MATCH / OK</strong> from public RPC data alone.
        </p>
      </div>

      <div class="card">
        <h3>Active Blessed Signatures</h3>
        <div id="sigList">loading...</div>
      </div>
    </main>

    <script>
      async function load() {
        const healthRes = await fetch("/api/health");
        const health = await healthRes.json();
        const sigRes = await fetch("/api/blessed-signatures");
        const sigJson = await sigRes.json();
        if (!sigJson.ok) throw new Error(sigJson.error || "failed to load signatures");
        const active = (sigJson.data.entries || []).filter((entry) => entry.status === "active");
        const items = active
          .map(
            (entry) => `
              <div class="card" style="margin-top: 12px;">
                <div><b>signature:</b> ${entry.signature}</div>
                <div><b>runtime_id:</b> ${entry.runtime_id}</div>
                <div><b>resolve_id:</b> ${entry.resolve_id}</div>
                <div><b>compiled_artifact_hash:</b> ${entry.compiled_artifact_hash}</div>
                <div><b>expected:</b> ${entry.verification_result} / ${entry.verification_reason}</div>
                <p>
                  <a href="/verify.html?sig=${encodeURIComponent(entry.signature)}&rpc=${encodeURIComponent(
                    health.rpc || sigJson.data.rpc_url
                  )}&programId=${encodeURIComponent(health.program_id || sigJson.data.program_id)}">
                    Open in Verify
                  </a>
                </p>
              </div>
            `
          )
          .join("");
        document.getElementById("sigList").innerHTML =
          items || "<p>No active blessed signatures found.</p>";
      }

      load().catch((error) => {
        document.getElementById("sigList").textContent = String(error);
      });
    </script>
  </body>
</html>
