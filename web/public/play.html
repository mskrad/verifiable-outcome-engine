<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>Verifiable Outcome Engine – Demo</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header>
    <a class="logo" href="/">
      <img src="/assets/logo.png" alt="VRE" class="logo-img" />
      <div>
        <div>Verifiable Outcome Engine</div>
        <span class="logo-sub">Solana · Devnet</span>
      </div>
    </a>
    <nav class="nav">
      <a href="/play.html" class="active">Demo</a>
      <a href="/build.html">Build</a>
      <a href="/verify.html">Verify</a>
      <a href="/spec.html">Spec</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h3>Active Devnet Signatures</h3>
      <p>
        Each signature below is a live resolved outcome on Solana devnet.
        Pick one — you will get <strong style="color:#14f195">MATCH / OK</strong> from public RPC data alone.
      </p>
    </div>

    <div id="sigList">
      <div class="loading"><div class="spinner"></div> Loading signatures…</div>
    </div>
  </main>

  <script>
    const EXPLORER = 'https://explorer.solana.com/tx';
    const CLUSTER  = 'devnet';
    const TYPE_META = {
      raffle: {
        label: 'Raffle',
        description: 'Select a verifiable winner from a committed weighted list.',
      },
      airdrop: {
        label: 'Airdrop',
        description: 'Weighted selection from eligible address list',
      },
      prediction: {
        label: 'Prediction',
        description: 'Verifiable outcome declaration — pre-committed before resolution',
      },
      loot: {
        label: 'Loot',
        description: 'Roll a committed weighted outcome table.',
      },
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function classifyEntry(entry) {
      const haystack = [
        entry.label,
        entry.description,
        entry.source,
        entry.notes,
        entry.id,
      ].filter(Boolean).join(' ').toLowerCase();

      if (haystack.includes('airdrop')) return 'airdrop';
      if (haystack.includes('prediction')) return 'prediction';
      if (haystack.includes('raffle')) return 'raffle';
      if (haystack.includes('loot')) return 'loot';
      return 'loot';
    }

    async function load() {
      const [healthRes, sigRes] = await Promise.all([
        fetch('/api/health'),
        fetch('/api/blessed-signatures'),
      ]);
      const health  = await healthRes.json();
      const sigJson = await sigRes.json();
      if (!sigJson.ok) throw new Error(sigJson.error || 'failed to load signatures');

      const active = (sigJson.data.entries || []).filter(e => e.status === 'active');
      if (!active.length) {
        document.getElementById('sigList').innerHTML =
          '<div class="card"><p>No active blessed signatures found.</p></div>';
        return;
      }

      const rpc       = health.rpc       || sigJson.data.rpc_url;
      const programId = health.program_id || sigJson.data.program_id;

      const html = active.map((entry, i) => {
        const type        = classifyEntry(entry);
        const meta        = TYPE_META[type] || TYPE_META.loot;
        const label       = escapeHtml(entry.label || meta.label);
        const description = escapeHtml(entry.description || meta.description);
        const verifyUrl   = `/verify.html?sig=${encodeURIComponent(entry.signature)}&rpc=${encodeURIComponent(rpc)}&programId=${encodeURIComponent(programId)}`;
        const explorerUrl = `${EXPLORER}/${entry.signature}?cluster=${CLUSTER}`;
        const timelineId  = `tl-${String(entry.id || i).replace(/[^a-zA-Z0-9_-]/g, '-')}`;

        return `
        <div class="sig-card sig-card-${type}">
          <div class="sig-card-header">
            <div class="sig-title">
              <span class="usecase-badge usecase-${type}">${label}</span>
              <span class="sig-number">Signature #${i + 1}</span>
            </div>
            <span class="badge-match">✓ MATCH / OK</span>
          </div>

          <p class="sig-description">${description}</p>

          <div class="sig-hash" title="${entry.signature}">${entry.signature}</div>

          <div class="sig-meta">
            <div class="sig-meta-row">runtime_id <br/><span>${entry.runtime_id}</span></div>
            <div class="sig-meta-row">resolve_id <br/><span>${entry.resolve_id}</span></div>
            <div class="sig-meta-row" style="grid-column:1/-1">artifact_hash <br/><span>${entry.compiled_artifact_hash}</span></div>
            <div class="sig-meta-row" style="grid-column:1/-1"><span id="${timelineId}" class="tl-compact"></span></div>
          </div>

          <div class="sig-actions">
            <a class="btn btn-primary" href="${verifyUrl}">▶ Verify Now</a>
            <a class="btn btn-ghost ext" href="${explorerUrl}" target="_blank" rel="noopener">Explorer</a>
            <button class="btn btn-ghost" onclick="copy('${entry.signature}', this)">Copy Sig</button>
          </div>
        </div>`;
      }).join('');

      document.getElementById('sigList').innerHTML = html;
      active.forEach((entry, i) => {
        const timelineId = `tl-${String(entry.id || i).replace(/[^a-zA-Z0-9_-]/g, '-')}`;
        fetchTimelineForCard(entry, rpc, programId, timelineId);
      });
    }

    async function fetchTimelineForCard(entry, rpc, programId, elementId) {
      const target = document.getElementById(elementId);
      if (!target || !entry.compiled_artifact_hash) return;
      try {
        const res = await fetch('/api/timeline', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            signature: entry.signature,
            rpcUrl: rpc,
            programId,
            compiledArtifactHash: entry.compiled_artifact_hash,
          }),
        });
        const data = await res.json();
        if (!data.ok) return;
        const artifactSlot = Number(data.artifact_slot);
        const resolutionSlot = Number(data.resolution_slot);
        const gapSlots = Number(data.gap_slots);
        if (!Number.isFinite(artifactSlot) || !Number.isFinite(resolutionSlot) || !Number.isFinite(gapSlots)) return;
        target.textContent = `slot ${artifactSlot.toLocaleString()} → ${resolutionSlot.toLocaleString()} (+${gapSlots.toLocaleString()} slots)`;
      } catch (_) {
        if (target) target.textContent = '';
      }
    }

    function copy(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    load().catch(err => {
      document.getElementById('sigList').innerHTML =
        `<div class="card"><p style="color:var(--red)">${err}</p></div>`;
    });
  </script>
</body>
</html>
