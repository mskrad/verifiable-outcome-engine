<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <title>Verifiable Outcome Engine – Verify</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header>
    <a class="logo" href="/">
      <img src="/assets/logo.png" alt="VRE" class="logo-img" />
      <div>
        <div>Verifiable Outcome Engine</div>
        <span class="logo-sub">Solana · Devnet</span>
      </div>
    </a>
    <nav class="nav">
      <a href="/play.html">Demo</a>
      <a href="/build.html">Build</a>
      <a href="/verify.html" class="active">Verify</a>
      <a href="/widget.html">Widget</a>
      <a href="/spec.html">Spec</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h3>Verify Outcome</h3>
      <p>Paste any resolved outcome transaction signature to replay and verify it independently.</p>

      <div class="grid2">
        <div>
          <label>Cluster</label>
          <select id="cluster">
            <option value="devnet">devnet</option>
            <option value="localnet">localnet</option>
          </select>
        </div>
        <div>
          <label>RPC URL</label>
          <input id="rpc" value="https://api.devnet.solana.com" />
        </div>
      </div>

      <label>Program ID</label>
      <input id="programId" value="3b7TFKQWUhPqWBieLHop4Mj2e41vwvnvjEosbsdmXkBq" />

      <label>Transaction Signature</label>
      <input id="sig" placeholder="Paste tx signature…" />

      <button id="btnReplay">▶ Run Verification</button>
    </div>

    <div id="resultSection" style="display:none">
      <div id="resultBanner"></div>
      <div id="artifactRulesSection" style="display:none"></div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <h3 style="margin:0">Raw Output</h3>
          <button class="btn btn-ghost" id="btnCopyJson">Copy JSON</button>
        </div>
        <pre id="out"></pre>
      </div>

      <div id="explorerLink" style="display:none;margin-top:4px"></div>
    </div>

    <div id="timelineSection" style="display:none"></div>
  </main>

  <script>
    const EXPLORER = 'https://explorer.solana.com/tx';
    const outEl    = document.getElementById('out');
    const params   = new URLSearchParams(location.search);

    const sigParam       = params.get('sig');
    const rpcParam       = params.get('rpc');
    const programIdParam = params.get('programId');
    if (sigParam)       document.getElementById('sig').value       = sigParam;
    if (rpcParam)       document.getElementById('rpc').value       = rpcParam;
    if (programIdParam) document.getElementById('programId').value = programIdParam;

    async function loadDefaults() {
      try {
        const res  = await fetch('/api/health');
        const json = await res.json();
        if (json.ok && json.program_id && !programIdParam)
          document.getElementById('programId').value = json.program_id;
        if (json.ok && json.rpc && !rpcParam)
          document.getElementById('rpc').value = json.rpc;
      } catch (_) {}
    }
    loadDefaults();

    if (sigParam) {
      window.addEventListener('load', () => {
        document.getElementById('btnReplay').click();
      });
    }

    document.getElementById('btnReplay').onclick = async () => {
      const btn       = document.getElementById('btnReplay');
      const sig       = document.getElementById('sig').value.trim();
      const rpc       = document.getElementById('rpc').value.trim();
      const programId = document.getElementById('programId').value.trim();
      const cluster   = document.getElementById('cluster').value;

      if (!sig) { alert('Transaction signature is required.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Replaying…';
      document.getElementById('resultSection').style.display = 'none';
      hideArtifactRules();
      hideTimeline();

      try {
        const res  = await fetch('/api/replay', {
          method:  'POST',
          headers: { 'content-type': 'application/json' },
          body:    JSON.stringify({ cluster, rpc, programId, signature: sig }),
        });
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'replay failed');

        const replay = json.replay || {};
        showResult(replay, sig, cluster, rpc, programId);
        if (replay.verification_result === 'MATCH') {
          fetchTimeline(replay.compiled_artifact_hash, sig, rpc, programId);
        } else {
          hideTimeline();
        }
      } catch (e) {
        showError(String(e));
      } finally {
        btn.disabled    = false;
        btn.textContent = '▶ Run Verification';
      }
    };

    function showResult(replay, sig, cluster, rpc, programId) {
      const isMatch  = replay.verification_result === 'MATCH';
      const section  = document.getElementById('resultSection');
      const banner   = document.getElementById('resultBanner');
      const explorer = document.getElementById('explorerLink');

      banner.innerHTML = `
        <div class="result-banner ${isMatch ? 'match' : 'mismatch'}">
          <div class="result-icon">${isMatch ? '✅' : '❌'}</div>
          <div>
            <div class="result-label">${replay.verification_result} / ${replay.verification_reason}</div>
            <div class="result-sub">${isMatch
              ? 'Outcome replayed successfully — computation matches on-chain record.'
              : 'Replay result does not match on-chain record.'}</div>
          </div>
        </div>
        ${isMatch && replay.outcome_id ? `
        <div class="card" style="margin-top:12px;border-color:rgba(20,241,149,.25);background:rgba(20,241,149,.05)">
          <div style="font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Selected Outcome</div>
          <div style="font-family:var(--mono);font-size:14px;color:var(--green);word-break:break-all">${replay.outcome_id}</div>
        </div>` : ''}`;

      outEl.textContent = JSON.stringify(replay, null, 2);
      renderArtifactRules(replay);

      const explorerUrl = `${EXPLORER}/${sig}?cluster=${cluster}`;
      explorer.innerHTML = `<a class="btn btn-ghost ext" href="${explorerUrl}" target="_blank" rel="noopener" style="margin-bottom:16px">View on Solana Explorer</a>`;
      explorer.style.display = 'block';

      section.style.display = 'block';
    }

    function hideArtifactRules() {
      const rules = document.getElementById('artifactRulesSection');
      rules.style.display = 'none';
      rules.innerHTML = '';
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function truncateMiddle(value, head = 10, tail = 10) {
      const text = String(value || '');
      if (text.length <= head + tail + 1) return text;
      return `${text.slice(0, head)}…${text.slice(-tail)}`;
    }

    function looksLikeAddress(value) {
      return /^[1-9A-HJ-NP-Za-km-z]{32,44}$/.test(String(value || ''));
    }

    function renderArtifactRules(replay) {
      const rules = document.getElementById('artifactRulesSection');
      const outcomes = Array.isArray(replay.outcomes) ? replay.outcomes : [];
      if (replay.verification_result !== 'MATCH' || outcomes.length === 0) {
        hideArtifactRules();
        return;
      }

      const winner = String(replay.outcome_id || '');
      const artifactHash = String(replay.compiled_artifact_hash || '');
      const listLabel = outcomes.every((outcome) => looksLikeAddress(outcome.id))
        ? 'Participants'
        : 'Outcomes';
      const totalWeight = outcomes.reduce((sum, outcome) => {
        const weight = Number(outcome.weight);
        return Number.isFinite(weight) ? sum + weight : sum;
      }, 0);

      const rows = outcomes.map((outcome) => {
        const id = String(outcome.id || '');
        const weight = Number(outcome.weight);
        const isWinner = id === winner;
        const weightText = Number.isFinite(weight)
          ? weight.toLocaleString()
          : String(outcome.weight ?? '');

        return `
          <div class="outcome-row ${isWinner ? 'winner' : ''}">
            <div class="outcome-id" title="${escapeHtml(id)}">${escapeHtml(truncateMiddle(id, 12, 12))}</div>
            <div class="outcome-weight">${escapeHtml(weightText)}</div>
            <div class="outcome-selected">${isWinner ? 'Selected' : ''}</div>
          </div>`;
      }).join('');

      rules.innerHTML = `
        <div class="artifact-rules">
          <div class="artifact-rules-head">
            <div>
              <h3>Committed Rules</h3>
              <p>${listLabel}: ${outcomes.length.toLocaleString()} · total weight ${totalWeight.toLocaleString()}</p>
            </div>
            <div class="artifact-hash" title="${escapeHtml(artifactHash)}">${escapeHtml(truncateMiddle(artifactHash, 8, 8))}</div>
          </div>
          <div class="outcome-row outcome-row-head">
            <div>Outcome</div>
            <div>Weight</div>
            <div>Status</div>
          </div>
          <div class="outcome-list">${rows}</div>
        </div>`;
      rules.style.display = 'block';
    }

    function hideTimeline() {
      const timeline = document.getElementById('timelineSection');
      timeline.style.display = 'none';
      timeline.innerHTML = '';
    }

    async function fetchTimeline(compiledArtifactHash, sig, rpc, programId) {
      if (!compiledArtifactHash) { hideTimeline(); return; }
      const timeline = document.getElementById('timelineSection');
      timeline.style.display = 'block';
      timeline.innerHTML = `
        <div class="timeline-block">
          <h4>Pre-commitment Proof</h4>
          <div class="loading"><div class="spinner"></div> Loading on-chain timeline…</div>
        </div>`;

      try {
        const res = await fetch('/api/timeline', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            signature: sig,
            rpcUrl: rpc,
            programId,
            compiledArtifactHash,
          }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'timeline unavailable');
        renderTimeline(data);
      } catch (_) {
        hideTimeline();
      }
    }

    function renderTimeline(data) {
      const artifactSlot = Number(data.artifact_slot);
      const resolutionSlot = Number(data.resolution_slot);
      const gapSlots = Number(data.gap_slots);
      if (!Number.isFinite(artifactSlot) || !Number.isFinite(resolutionSlot) || !Number.isFinite(gapSlots)) {
        hideTimeline();
        return;
      }

      const gapSecs = Math.round(gapSlots * 0.4);
      document.getElementById('timelineSection').innerHTML = `
        <div class="timeline-block">
          <h4>Pre-commitment Proof</h4>
          <div class="timeline-track">
            <div class="timeline-point artifact">
              <div class="tl-label">Artifact locked</div>
              <div class="tl-slot">slot ${artifactSlot.toLocaleString()}</div>
            </div>
            <div class="timeline-gap">← ${gapSlots.toLocaleString()} slots (~${gapSecs.toLocaleString()} sec) →</div>
            <div class="timeline-point resolution">
              <div class="tl-label">Outcome drawn</div>
              <div class="tl-slot">slot ${resolutionSlot.toLocaleString()}</div>
            </div>
          </div>
          <p class="timeline-caption">
            Rules were committed on-chain before the outcome was drawn.
            The operator could not change the artifact after seeing the result.
          </p>
        </div>`;
      document.getElementById('timelineSection').style.display = 'block';
    }

    function showError(msg) {
      hideArtifactRules();
      hideTimeline();
      const section = document.getElementById('resultSection');
      const banner  = document.getElementById('resultBanner');
      banner.innerHTML = `
        <div class="result-banner mismatch">
          <div class="result-icon">⚠️</div>
          <div>
            <div class="result-label">ERROR</div>
            <div class="result-sub">${msg}</div>
          </div>
        </div>`;
      outEl.textContent = msg;
      document.getElementById('explorerLink').style.display = 'none';
      section.style.display = 'block';
    }

    document.getElementById('btnCopyJson').onclick = function() {
      navigator.clipboard.writeText(outEl.textContent).then(() => {
        this.textContent = '✓ Copied';
        setTimeout(() => this.textContent = 'Copy JSON', 1500);
      });
    };
  </script>
</body>
</html>
