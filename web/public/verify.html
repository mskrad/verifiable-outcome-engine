<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifiable Outcome Engine – Verify</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header>
      <h1>Verify Outcome</h1>
      <div class="nav">
        <a href="/play.html">Demo</a>
        <a href="/verify.html">Verify</a>
        <a href="/spec.html">Spec</a>
      </div>
    </header>
    <main>
      <div class="card">
        <div class="grid2">
          <div>
            <label for="cluster">Cluster</label>
            <select id="cluster">
              <option value="devnet">devnet</option>
              <option value="localnet">localnet</option>
            </select>
          </div>
          <div>
            <label for="rpc">RPC URL</label>
            <input id="rpc" value="https://api.devnet.solana.com" />
          </div>
          <div>
            <label for="programId">Program ID</label>
            <input
              id="programId"
              value="3b7TFKQWUhPqWBieLHop4Mj2e41vwvnvjEosbsdmXkBq"
            />
          </div>
        </div>
        <label for="sig">Transaction signature</label>
        <input id="sig" placeholder="paste tx signature" />
        <button id="btnReplay">Verify</button>
      </div>

      <div class="card">
        <h3>Verification Result</h3>
        <div id="status"></div>
        <pre id="out"></pre>
      </div>
    </main>

    <script>
      const outEl = document.getElementById("out");
      const statusEl = document.getElementById("status");
      const params = new URLSearchParams(location.search);
      const sigParam = params.get("sig");
      const rpcParam = params.get("rpc");
      const programIdParam = params.get("programId");
      if (sigParam) document.getElementById("sig").value = sigParam;
      if (rpcParam) document.getElementById("rpc").value = rpcParam;
      if (programIdParam) document.getElementById("programId").value = programIdParam;

      async function loadDefaults() {
        try {
          const res = await fetch("/api/health");
          const json = await res.json();
          if (json.ok && json.program_id && !programIdParam) {
            document.getElementById("programId").value = json.program_id;
          }
          if (json.ok && json.rpc && !rpcParam) {
            document.getElementById("rpc").value = json.rpc;
          }
        } catch (_) {
          // optional health bootstrap
        }
      }
      loadDefaults();

      document.getElementById("btnReplay").onclick = async () => {
        try {
          const sig = document.getElementById("sig").value.trim();
          const rpc = document.getElementById("rpc").value.trim();
          const programId = document.getElementById("programId").value.trim();
          if (!sig) throw new Error("signature is required");
          statusEl.textContent = "Replaying...";
          outEl.textContent = "";
          const res = await fetch("/api/replay", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              cluster: document.getElementById("cluster").value,
              rpc,
              programId,
              signature: sig,
            }),
          });
          const json = await res.json();
          if (!json.ok) throw new Error(json.error || "replay failed");
          const replay = json.replay || {};
          statusEl.textContent = `${replay.verification_result || "UNKNOWN"} / ${
            replay.verification_reason || "UNKNOWN"
          }`;
          outEl.textContent = JSON.stringify(replay, null, 2);
        } catch (e) {
          statusEl.textContent = "ERROR";
          outEl.textContent = String(e);
        }
      };
    </script>
  </body>
</html>
